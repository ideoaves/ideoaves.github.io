<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>横断年表(昭和40年代中心)</title>
    <style>
        :root {
            --lineP: 95px;
            --dotP: 8px;
            --midColor: #999;
        }

        body {
            margin: 20px;
            font-family: 'IBM Plex Sans JP', sans-serif;
            background-color: white;
        }

        h1 {
            color: #333;
            margin: 0;
        }

        .timeline {
            position: relative;
            margin-top: 10px;
        }

        .event {
            position: absolute;
            white-space: nowrap;
            font-size: 13px;
        }

        .event-line,
        .event-line-cont,
        .event-line-fin {
            position: absolute;
            left: var(--lineP);
            width: 3px;
            z-index: -1;
        }

        .event-line {
            top: var(--dotP);
            background: var(--midColor);
        }

        .event-line-cont {
            top: var(--dotP);
            height: 100px;
            background: linear-gradient(to bottom, var(--midColor), rgba(153, 153, 153, 0));
        }

        .event-line-fin {
            bottom: var(--dotP);
            height: 120px;
            background: linear-gradient(to top, var(--midColor), rgba(153, 153, 153, 0));
        }

        .dot {
            position: absolute;
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background-color: white;
            border: 3px solid var(--midColor);
            left: calc(var(--lineP) - 3.5px);
            top: 50%;
            transform: translateY(-50%);
            z-index: 1;
        }

        .event-date {
            display: inline-block;
            width: 80px;
            margin-right: 20px;
            text-align: right;
            color: #666;
        }

        .event-title {
            margin-left: 10px;
            background-color: hsla(0, 0%, 100%, 0.5);
            font-weight: 500;
            color: #333;
        }

        .year-label {
            position: absolute;
            left: 0;
            color: var(--midColor);
            font-size: 21px;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <h1>横断年表(昭和40年代中心)</h1>
    主に60年代～80年代における日本の空気感と当時のサブカルに焦点をあて、ジャンルをまたいで比較するための年表です。<br>
    技術発明と流行を混ぜてアーリーアダプター層の視点を作り出そうとしています<br>
    <label><input type="checkbox" id="viewMode">時間距離⇔等間隔</label>

    <div class="timeline" id="timeline"></div>

    <script>
        let timelineData = {};
        let yearPixel = 100;
        let isCompactView = false;

        // 日付をパースして数値に変換する関数
        function parseDate(dateStr) {
            const parts = dateStr.split('/');
            const year = parseInt(parts[0]) || 0;
            const month = parseInt(parts[1]) || 0;
            const day = parseInt(parts[2]) || 0;

            return { year, month, day };
        }

        // 日付をY座標に変換する関数
        function dateToYPosition(dateObj, index) {
            if (isCompactView) {
                return index * 20 + 20;
            } else {
                // 時間的に正しい表示
                const yearOffset = (dateObj.year - 1943) * yearPixel;
                let monthOffset = 0;
                let dayOffset = 0;

                if (dateObj.month > 0) {
                    monthOffset = (dateObj.month - 1) * (yearPixel / 12);
                }
                if (dateObj.day > 0) {
                    dayOffset = (dateObj.day - 1) * ((yearPixel / 12) / 30);
                }

                return (yearOffset + monthOffset + dayOffset) + index * 14;
            }
        }

        // end_dateに対応するイベントのY位置を見つける関数
        function findEventPositionByDate(targetDate, currentIndex, currentTags = []) {
            const sortedData = [...timelineData].sort((a, b) => {
                const dateA = parseDate(a.sort_date);
                const dateB = parseDate(b.sort_date);

                if (dateA.year !== dateB.year) return dateA.year - dateB.year;
                if (dateA.month !== dateB.month) return dateA.month - dateB.month;
                return dateA.day - dateB.day;
            });

            // 同じタグを持つイベントを優先して探す
            let matchingEvents = [];
            let otherEvents = [];

            for (let i = 0; i < sortedData.length; i++) {
                const data = sortedData[i];
                if (data.date === targetDate) {
                    const eventTags = data.tag.split(',').map(tag => tag.trim());
                    const hasCommonTag = currentTags.some(tag => eventTags.includes(tag));

                    if (hasCommonTag) {
                        matchingEvents.push({ data, index: i });
                    } else {
                        otherEvents.push({ data, index: i });
                    }
                }
            }

            // 同じタグを持つイベントを優先、なければ最初のイベントを使用
            const targetEvent = matchingEvents.length > 0 ? matchingEvents[0] : otherEvents[0];

            if (targetEvent) {
                const dateObj = parseDate(targetEvent.data.sort_date);
                if (dateObj) {
                    return dateToYPosition(dateObj, targetEvent.index);
                }
            }
            return null;
        }

        function getTagPosition(tag) {
            const tags = ['政治', '世相', '事件', '学生', '運動', '技術', 'コンピュータ', 'インターネット', '天文', '建築', '芸術', '音楽', 'ファッション', 'サブ'];
            const index = tags.indexOf(tag);
            return index >= 0 ? (index * 150) + 70 : 70;
        }

        // イベントを作成する関数
        function createEvent(eventDate, data, index) {
            const event = document.createElement('div');
            event.className = 'event';

            const dateObj = parseDate(data.sort_date);
            const yPosition = dateToYPosition(dateObj, index);

            event.style.top = yPosition + 'px';

            const tags = data.tag.split(',').map(tag => tag.trim());
            let xPos = 0;

            if (tags.length === 1) {
                xPos = getTagPosition(tags[0]);
            } else if (tags.length === 2) {
                const pos1 = getTagPosition(tags[0]);
                const pos2 = getTagPosition(tags[1]);
                xPos = pos1 + ((pos2 - pos1) * 0.8);
            }

            event.style.left = xPos + 'px';

            // 日付表示
            const dateSpan = document.createElement('span');
            dateSpan.className = 'event-date';

            if (eventDate) {
                const parts = eventDate.split('/');
                if (parts[2] === '00') {
                    if (parts[1] === '00') {
                        dateSpan.textContent = parts[0];
                    } else {
                        dateSpan.textContent = parts[0] + '/' + parts[1];
                    }
                } else {
                    dateSpan.textContent = eventDate;
                }
            }

            const titleSpan = document.createElement('span');
            titleSpan.className = 'event-title';
            titleSpan.textContent = data['event-title'];

            event.appendChild(dateSpan);
            event.appendChild(titleSpan);

            //end_dateまで線を引くよ
            if (data.end_date && data.end_date !== '') {
                // マーカー円を描画
                const marker = document.createElement('div');
                marker.className = 'dot';
                event.appendChild(marker);

                // カンマ区切りで複数指定されている場合を処理
                const endDates = data.end_date.split(',').map(s => s.trim());

                endDates.forEach(endDate => {
                    if (endDate === 'cont') {
                        // contの場合
                        const line = document.createElement('div');
                        line.className = 'event-line-cont';
                        event.appendChild(line);
                    } else if (endDate === 'fin') {
                        // finの場合
                        const line = document.createElement('div');
                        line.className = 'event-line-fin';
                        event.appendChild(line);
                    } else {
                        // 日付指定の場合
                        const currentTags = data.tag.split(',').map(tag => tag.trim());
                        const endYPosition = findEventPositionByDate(endDate, index, currentTags);
                        if (endYPosition !== null) {
                            const lineHeight = (endYPosition - yPosition) + 8;

                            const line = document.createElement('div');
                            line.className = 'event-line';
                            line.style.height = lineHeight + 'px';
                            event.appendChild(line);
                        }
                    }
                });
            }

            return event;
        }

        // タイムラインを描画する関数
        function renderTimeline() {
            const timeline = document.getElementById('timeline');
            timeline.innerHTML = '';

            const sortedData = [...timelineData].sort((a, b) => {
                const dateA = parseDate(a.sort_date);
                const dateB = parseDate(b.sort_date);

                if (!dateA) return 1;
                if (!dateB) return -1;

                if (dateA.year !== dateB.year) return dateA.year - dateB.year;
                if (dateA.month !== dateB.month) return dateA.month - dateB.month;
                return dateA.day - dateB.day;
            });

            let currentYear = null;

            sortedData.forEach((data, index) => {
                const dateObj = parseDate(data.sort_date);

                // 年が変わったら年ラベルを追加
                if (dateObj && dateObj.year !== currentYear) {
                    currentYear = dateObj.year;
                    const yearLabel = document.createElement('div');
                    yearLabel.className = 'year-label';
                    yearLabel.textContent = currentYear;
                    const yearStartObj = { year: currentYear, month: 0, day: 0 };
                    const yearStartYPosition = dateToYPosition(yearStartObj, index);
                    yearLabel.style.top = yearStartYPosition + 'px';

                    timeline.appendChild(yearLabel);
                }

                const event = createEvent(data.date, data, index);
                if (event) {
                    timeline.appendChild(event);
                }
            });

            const lastDate = parseDate(sortedData[sortedData.length - 1].sort_date);
            if (lastDate) {
                const maxY = dateToYPosition(lastDate, sortedData.length - 1) + 100;
                timeline.style.height = maxY + 'px';
            }

            // すべてのイベント描画完了後に、end_dateで指定された先のイベントにマーカーを追加
            const allEvents = document.querySelectorAll('.event');
            allEvents.forEach(event => {
                const dateSpan = event.querySelector('.event-date');
                if (dateSpan) {
                    const eventDate = dateSpan.textContent;
                    // 表示形式とデータ形式の両方でマッチングを試みる
                    const eventData = sortedData.find(data => {
                        return data.date === eventDate ||
                            (data.date.endsWith('/00/00') && data.date.split('/')[0] === eventDate) ||
                            (data.date.endsWith('/00') && data.date.split('/').slice(0, 2).join('/') === eventDate);
                    });
                    if (eventData && eventData.end_date) {
                        const endDates = eventData.end_date.split(',').map(s => s.trim());
                        endDates.forEach(endDate => {
                            if (endDate.includes('/')) {
                                // 先のイベントにマーカー円を描画
                                const endEventElements = document.querySelectorAll('.event');
                                endEventElements.forEach(el => {
                                    const endDateSpan = el.querySelector('.event-date');
                                    if (endDateSpan && endDateSpan.textContent === endDate) {
                                        // 既にマーカーがあるかチェック
                                        if (!el.querySelector('.dot')) {
                                            const endMarker = document.createElement('div');
                                            endMarker.className = 'dot';
                                            el.appendChild(endMarker);
                                        }
                                    }
                                });
                            }
                        });
                    }
                }
            });
        }

        // 表示コントロールを設定
        function setupViewControl() {
            const checkbox = document.getElementById('viewMode');

            checkbox.addEventListener('change', function () {
                isCompactView = this.checked;
                renderTimeline();
            });
        }

        // JSONデータを読み込む関数
        async function loadTimelineData() {
            const response = await fetch('timeline.json');
            const jsonData = await response.json();

            // timeline_2.json形式に対応：配列形式に変換して同じ日付の複数イベントに対応
            timelineData = [];
            for (const [eventTitle, value] of Object.entries(jsonData)) {
                timelineData.push({
                    date: value.date,
                    sort_date: value.sort_date,
                    'event-title': eventTitle,
                    tag: value.tag,
                    end_date: value.end_date || "",
                    to_date: value.to_date || ""
                });
            }

            renderTimeline();
            setupViewControl();
        }

        document.addEventListener('DOMContentLoaded', loadTimelineData);
    </script>
</body>

</html>
