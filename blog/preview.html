<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>blog editor ( 𝐼𝑑𝑒𝑜𝑎𝑣𝑒𝑠 )</title>
    <meta name="description" content="ブログのライブエディタ">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <link rel="stylesheet" href="../style.css">

    <style>
        /* このページ専用のレイアウト。左にtxt構文のエディタ、右に本番と同じ見た目のプレビューを置くよ。 */
        body {
            max-width: 1500px;
        }

        .エディタ全体 {
            display: flex;
            gap: 20px;
            align-items: flex-start;
        }

        .エディタ側 {
            position: sticky;
            top: 10px;
            flex: 0 0 42%;
        }

        .エディタ側 textarea {
            width: 100%;
            height: calc(100vh - 40px);
            box-sizing: border-box;
            padding: 15px;
            border: none;
            outline: 1px solid #000;
            border-radius: 20px;
            background-color: rgba(255, 255, 255, 0.5);
            font-family: inherit;
            font-size: inherit;
            line-height: 1.8;
            resize: none;
        }

        .プレビュー側 {
            flex: 1;
            min-width: 0;
            max-width: 700px;
            margin: 0 auto;
        }

        @media screen and (max-width:900px) {
            .エディタ全体 {
                flex-direction: column;
            }

            .エディタ側 {
                position: static;
                width: 100%;
                flex: none;
            }

            .エディタ側 textarea {
                height: 40vh;
            }
        }
    </style>
</head>


<body>
    <header>
        <div class="ロゴ"></div>
        <div id="ヘッダー"></div>
    </header>

    <main>
        <div class="エディタ全体">
            <div class="エディタ側">
                <textarea id="入力" spellcheck="false" placeholder="1行目はタイトル。2行目にid=著者。あとは本文。"></textarea>
            </div>

            <div class="プレビュー側">
                <div class="横に狭い分類">
                    <div id="プレビュー"></div>
                    <div class="承認欲求">
                        <div class="heart">♥<span class="乱数"></span></div>
                        <div class="up">⤴<span class="乱数"></span></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script async src="https://platform.twitter.com/widgets.js"></script>
    <script>
        /* ここからbuild_v2.pyの変換ロジックをJavaScriptに移植したものだよ。
           Pythonを変更したら、こちらも同じように変更すること。 */

        // 見出しのテキストから目次用のアンカー文字列を作るよ。（Pythonの \W+ → '-' と同じ挙動）
        function anchorize(title) {
            return title.replace(/[^\p{L}\p{N}_]+/gu, "-");
        }

        // [ ] で囲まれたインライン構文をHTMLに変換するよ。深さを数えて対応する"]"を探し、中身を再帰処理する。
        function processInline(text, topLevel = true) {
            let result = "";
            let i = 0;
            const n = text.length;
            while (i < n) {
                if (text[i] === "[") {
                    let depth = 1;
                    let j = i + 1;
                    while (j < n && depth > 0) {
                        if (text[j] === "[") depth++;
                        else if (text[j] === "]") depth--;
                        j++;
                    }
                    if (depth === 0) {
                        result += convertBracket(text.slice(i + 1, j - 1), topLevel);
                        i = j;
                        continue;
                    }
                }
                result += text[i];
                i++;
            }
            return result;
        }

        // topLevelがfalse（他の[...]構文の中）のときはYouTube/Twitterの埋め込み変換をしないよ。
        function convertBracket(content, topLevel = true) {
            if (content.startsWith("i ")) {
                const filename = content.slice(2).trim();
                return `<img alt="" class="ブログの画像" src="blog_img/${filename}">`;
            }

            if (content.startsWith("s ")) {
                return `<span class="小さい文字">${processInline(content.slice(2).trim(), false)}</span>`;
            }

            if (content.startsWith("> ")) {
                return `<span class="引用"><span>${processInline(content.slice(2).trim(), false)}</span></span>`;
            }

            if (content.startsWith("c ")) {
                return `<span class="コメント文字">${processInline(content.slice(2).trim(), false)}</span>`;
            }

            const cursorM = content.match(/^(.+?)\s+\{(.+)\}$/s);
            if (cursorM) {
                const textA = processInline(cursorM[1], false);
                const textB = processInline(cursorM[2], false);
                return `<span class="カーソルを"><span>${textA}</span><span>${textB}</span></span>`;
            }

            const linkM = content.match(/^(.+?)\s+(\S+)$/s);
            if (linkM) {
                return `<a href="${linkM[2]}">${processInline(linkM[1], false)}</a>`;
            }

            // ここまでで判定できなければ、中身は単独の [URL] として扱うよ。
            const url = content.trim();

            if (topLevel) {
                const tweetM = url.match(/(?:x|twitter)\.com\/([A-Za-z0-9_]+)\/status\/(\d+)/);
                if (tweetM) {
                    return `<blockquote class="twitter-tweet"><a href="https://twitter.com/${tweetM[1]}/status/${tweetM[2]}"></a></blockquote>`
                        + `<script async src="https://platform.twitter.com/widgets.js"><\/script>`;
                }

                const ytM = url.match(/^(?:https:\/\/www\.youtube\.com\/watch\?v=|https:\/\/youtu\.be\/)([^&\s?]+)/);
                if (ytM) {
                    return `<iframe src="https://www.youtube.com/embed/${ytM[1]}" allow="picture-in-picture" allowfullscreen></iframe>`;
                }
            }

            return `<a href="${url}">${url}</a>`;
        }

        // 記事テキスト全体を、build_v2.pyと同じ手順でHTMLに変換するよ。
        function convertArticle(text) {
            const fileLines = text.trim().split(/\r\n|\r|\n/);
            const titleLine = (fileLines.length && fileLines[0].trim() !== "")
                ? fileLines[0].trim()
                : "( U̴̺͎͙̔͆̔n̴͙̦̟͛̾͝t̸̼̘̺͑̽̽i̸̝͖̻͋̿͊t̴͉͎̟͊͒̕l̸̝̞͒̕̕è̴͉̫̫̒̓d̴̙͎̟̓͝͝ )";
            const restLines = fileLines.slice(1);

            let authorId = "";
            let bodyLines;
            if (restLines.length && restLines[0].trim().startsWith("id=")) {
                authorId = restLines[0].trim().slice(3).trim();
                bodyLines = restLines.slice(1);
            } else {
                bodyLines = restLines;
            }

            const blocks = [];
            const toc = [];
            let paragraphBuf = [];
            const bulletStack = [];
            const bulletRoots = [];
            const tableBuf = []; // テーブル行を集めるよ。各要素は [isHeader, cells]。

            function closeParagraph() {
                if (paragraphBuf.length) {
                    let processed = processInline(paragraphBuf.join("\n"));
                    processed = processed.replace(/\r\n|\r|\n/g, "<br>\n");
                    // 画像やTwitter埋め込みはブロック要素なので、直後の<br>は二重改行になる。例外的に取り除くよ。
                    processed = processed.replace(
                        /(<img[^>]*>|<script async src="https:\/\/platform\.twitter\.com\/widgets\.js"><\/script>)<br>\n/g,
                        "$1\n",
                    );
                    blocks.push(`<p>${processed}</p>`);
                    paragraphBuf = [];
                }
            }

            function closeBullets(minDepth) {
                while (bulletStack.length && bulletStack[bulletStack.length - 1].depth >= minDepth) {
                    const frame = bulletStack.pop();
                    const childrenHtml = frame.children.length ? `<ul>${frame.children.join("")}</ul>` : "";
                    const liHtml = `<li>${frame.text}${childrenHtml}</li>`;
                    if (bulletStack.length) {
                        bulletStack[bulletStack.length - 1].children.push(liHtml);
                    } else {
                        bulletRoots.push(liHtml);
                    }
                }
            }

            function endBulletRun() {
                closeBullets(0);
                if (bulletRoots.length) {
                    blocks.push(`<ul>${bulletRoots.join("")}</ul>`);
                    bulletRoots.length = 0;
                }
            }

            // テーブル行の並びが終わったときに呼ぶ。||で始まる行だけheadにし、それ以外はtbodyに積むよ。
            function closeTable() {
                if (tableBuf.length) {
                    let theadHtml = "";
                    let tbodyHtml = "";
                    for (const [isHeader, cells] of tableBuf) {
                        if (isHeader) {
                            const rowHtml = cells.map(cell => `<th>${cell}</th>`).join("");
                            theadHtml += `<thead><tr>${rowHtml}</tr></thead>`;
                        } else {
                            const rowHtml = cells.map(cell => `<td>${cell}</td>`).join("");
                            tbodyHtml += `<tr>${rowHtml}</tr>`;
                        }
                    }
                    blocks.push(`<table>${theadHtml}<tbody>${tbodyHtml}</tbody></table>`);
                    tableBuf.length = 0;
                }
            }

            for (const line of bodyLines) {
                if (line.trim() === "") {
                    closeParagraph();
                    endBulletRun();
                    closeTable();
                    continue;
                }

                const headingM = line.match(/^(#{1,3})\s+(.+)$/);
                if (headingM) {
                    closeParagraph();
                    endBulletRun();
                    closeTable();
                    const level = headingM[1].length;
                    const headingTitle = headingM[2].trim();
                    const anchor = anchorize(headingTitle);
                    if (level <= 2) {
                        toc.push([level, headingTitle, anchor]);
                    }
                    blocks.push(`<h${level} id="${anchor}">${processInline(headingTitle)}</h${level}>`);
                    continue;
                }

                const bulletM = line.match(/^(\s+)(\S.*)$/);
                if (bulletM) {
                    closeParagraph();
                    closeTable();
                    const depth = bulletM[1].length;
                    closeBullets(depth);
                    bulletStack.push({
                        depth: depth,
                        text: processInline(bulletM[2].trim()),
                        children: [],
                    });
                    continue;
                }

                // テーブル行構文 |セル1  セル2  セル3 （セルは空白2つかタブで区切るよ）。||で始まる行はheadになる。
                const tableM = line.match(/^\|(\|?)(.*)$/);
                if (tableM) {
                    closeParagraph();
                    endBulletRun();
                    const isHeader = tableM[1] === "|";
                    const cells = tableM[2].split(/\t| {2,}/).map(cell => processInline(cell.trim()));
                    tableBuf.push([isHeader, cells]);
                    continue;
                }

                endBulletRun();
                closeTable();
                paragraphBuf.push(line);
            }

            closeParagraph();
            endBulletRun();
            closeTable();

            // 見出しが3件より多く集まったら、記事の先頭に目次ブロックを挿入するよ。
            if (toc.length > 3) {
                let tocHtml = '<div class="目次"><h4>目次</h4>';
                for (const [level, tocTitle, anchor] of toc) {
                    const cls = level === 2 ? ' class="h2"' : "";
                    tocHtml += `<a href="#${anchor}"${cls}>${tocTitle}</a><br>`;
                }
                tocHtml += "</div>";
                blocks.unshift(tocHtml);
            }

            const authorHtml = authorId ? `<div class="作った人たち">${authorId}</div>\n` : "";
            return `<h1>${titleLine}</h1>\n${authorHtml}${blocks.join("\n")}`;
        }

        /* ここからエディタページの動作だよ。 */

        const 入力 = document.getElementById("入力");
        const プレビュー = document.getElementById("プレビュー");

        function render() {
            プレビュー.innerHTML = convertArticle(入力.value);

            // JS.jsが読み込み時にやっている「カーソルを」注釈の初期化を、再描画のたびにやり直すよ。
            プレビュー.querySelectorAll(".カーソルを").forEach(el => {
                el.setAttribute("tabindex", "0");
                const spans = el.querySelectorAll("span");
                if (spans.length > 1) {
                    spans[1].classList.add("すると出る");
                }
            });

            // Twitter埋め込みがあれば、widgets.jsに描画してもらうよ。
            if (window.twttr && window.twttr.widgets) {
                window.twttr.widgets.load(プレビュー);
            }
        }

        let timer = null;
        入力.addEventListener("input", () => {
            clearTimeout(timer);
            timer = setTimeout(render, 200);
        });

        // 閉じたり更新したりしても書きかけが消えないよう、localStorageに自動保存するよ。
        const 保存キー = "blog-preview-draft";
        入力.addEventListener("input", () => {
            localStorage.setItem(保存キー, 入力.value);
        });
        const 下書き = localStorage.getItem(保存キー);
        if (下書き) {
            入力.value = 下書き;
        }
        render();
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.js"></script>
    <script src="../JS.js"></script>
</body>

</html>
